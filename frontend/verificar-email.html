<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar email - GolazoStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=20260310-1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="icon" type="image/png" href="assets/images/logo.png">
</head>
<body>
    <header></header>
    <main>
        <section class="py-5">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-6">
                        <div class="card border-0 shadow-sm p-4 p-lg-5 text-center">
                            <div id="loadingState">
                                <i class="fas fa-spinner fa-spin fa-4x text-danger mb-4"></i>
                                <h1 class="h3 mb-3">Verificando cuenta</h1>
                                <p class="text-ui-muted mb-0">Estamos validando tu email.</p>
                            </div>

                            <div id="successState" style="display:none;">
                                <i class="fas fa-circle-check fa-4x text-success mb-4"></i>
                                <h2 class="h3 text-success mb-3">Cuenta verificada</h2>
                                <p class="text-ui-muted mb-4">Tu email ya está confirmado. Puedes iniciar sesión y continuar con la tienda.</p>
                                <a href="login.html" class="btn btn-danger btn-lg">Ir al login</a>
                            </div>

                            <div id="errorState" style="display:none;">
                                <i class="fas fa-circle-xmark fa-4x text-danger mb-4"></i>
                                <h2 class="h3 text-danger mb-3">No pudimos verificar el email</h2>
                                <p class="text-ui-muted mb-4" id="errorMessage">El enlace es inválido o expiró.</p>
                                <a href="home.html" class="btn btn-outline-brand">Volver al inicio</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/runtime-config.js"></script>
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/shell.js?v=20260310-1"></script>
    <script src="js/main.js"></script>
    <script src="js/verificar-email.js"></script>
</body>
</html>
