<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Subir Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <script>
        // Protección simple de frontend (backend debe validar también)
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (!user || user.role !== 'admin') {
            alert('Acceso denegado. Solo administradores.');
            window.location.href = '../login.html';
        }
    </script>

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="../index.html">
                <i class="fas fa-arrow-left me-2"></i> Volver a la Tienda
            </a>
            <span class="navbar-text text-white">
                Panel de Administración - Subir Productos
            </span>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-danger text-white">
                        <h4 class="mb-0"><i class="fas fa-plus-circle me-2"></i>Nuevo Producto</h4>
                    </div>
                    <div class="card-body">
                        <form id="productForm">

                            <div class="mb-3">
                                <label class="form-label">Nombre del Producto</label>
                                <input type="text" class="form-control" name="name" required
                                    placeholder="Ej: Camiseta Boca Juniors 2025">
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Precio ($)</label>
                                    <input type="number" class="form-control" name="price" step="0.01" required
                                        placeholder="89.99">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Stock Inicial</label>
                                    <input type="number" class="form-control" name="stock" value="10" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Especificaciones (Opcional, formato JSON o Texto)</label>
                                <textarea class="form-control" name="specifications" rows="4"
                                    placeholder='Ej: {"Material": "Algodón", "Origen": "Argentina"}'></textarea>
                                <div class="form-text">Si usas JSON, se mostrará como tabla. Si es texto, como párrafo.
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Imagen del Producto</label>
                                <input type="file" class="form-control" name="image" accept="image/*" required>
                                <div class="form-text">Formatos permitidos: JPG, PNG, WEBP.</div>
                            </div>

                            <!-- Opciones Ocultas por defecto pero enviadas -->
                            <input type="hidden" name="sizes" value='["S","M","L","XL"]'>
                            <input type="hidden" name="category_id" value="1">

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-danger btn-lg">
                                    <i class="fas fa-upload me-2"></i>Subir Producto
                                </button>
                            </div>

                        </form>
                    </div>
                </div>

                <!-- Lista de productos recientes -->
                <div class="mt-5">
                    <h5><i class="fas fa-list me-2"></i>Productos en Base de Datos</h5>
                    <div id="productsList" class="list-group">
                        <!-- Se llena dinámicamente -->
                        <div class="text-center py-3">
                            <div class="spinner-border text-danger" role="status"></div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
        <div id="liveToast" class="toast hide" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header bg-success text-white">
                <strong class="me-auto">Éxito</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body bg-white">
                Producto subido correctamente.
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/admin.js"></script>
</body>

</html>
