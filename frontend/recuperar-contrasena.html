<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contrasena - GolazoStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="icon" type="image/png" href="assets/images/logo.png">
</head>
<body>
    <header></header>
    <main>
        <nav aria-label="breadcrumb">
            <div class="container">
                <ol class="breadcrumb py-3 mb-0">
                    <li class="breadcrumb-item"><a href="home.html"><i class="fas fa-home"></i> Inicio</a></li>
                    <li class="breadcrumb-item"><a href="login.html">Login</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Recuperar contrasena</li>
                </ol>
            </div>
        </nav>

        <section class="py-5">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-5 col-md-7">
                        <div class="card border-0 shadow-sm">
                            <div class="card-body p-4 p-lg-5">
                                <div class="text-center mb-4">
                                    <i class="fas fa-key fa-4x text-danger mb-3"></i>
                                    <p class="eyebrow mb-2">Recuperacion</p>
                                    <h1 class="h3 mb-2">Restablecer acceso</h1>
                                    <p class="text-muted mb-0">Te enviaremos un enlace para crear una nueva contrasena.</p>
                                </div>

                                <form id="recoveryForm">
                                    <div class="mb-4">
                                        <label for="recoveryEmail" class="form-label">Email</label>
                                        <input type="email" class="form-control" id="recoveryEmail" required>
                                    </div>
                                    <div id="formAlert" class="alert d-none" role="alert"></div>
                                    <div class="d-grid">
                                        <button type="submit" class="btn btn-danger btn-lg" id="submitBtn">
                                            <i class="fas fa-paper-plane me-2"></i>Enviar enlace
                                        </button>
                                    </div>
                                </form>

                                <div id="successMessage" class="text-center" style="display:none;">
                                    <i class="fas fa-envelope-open-text fa-4x text-success mb-3"></i>
                                    <h2 class="h4 text-success">Revisa tu email</h2>
                                    <p class="text-muted mb-2">Enviamos instrucciones a:</p>
                                    <p class="fw-semibold mb-3" id="sentToEmail"></p>
                                    <div class="d-grid gap-2">
                                        <button class="btn btn-outline-danger" id="tryAgainBtn" type="button">Usar otro email</button>
                                        <a href="login.html" class="btn btn-danger">Volver al login</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/runtime-config.js"></script>
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/shell.js"></script>
    <script src="js/main.js"></script>
    <script src="js/recuperar-contrasena.js"></script>
</body>
</html>
