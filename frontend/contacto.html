<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - GolazoStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="icon" type="image/png" href="assets/images/logo.png">
</head>
<body>
    <header></header>
    <main>
        <nav aria-label="breadcrumb">
            <div class="container">
                <ol class="breadcrumb py-3 mb-0">
                    <li class="breadcrumb-item"><a href="home.html"><i class="fas fa-home"></i> Inicio</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Contacto</li>
                </ol>
            </div>
        </nav>

        <section class="py-5">
            <div class="container">
                <div class="text-center mb-5">
                    <p class="eyebrow mb-2">Soporte</p>
                    <h1 class="mb-2">Hablemos de tu compra</h1>
                    <p class="text-muted mb-0">Usa este formulario para consultas de talles, stock, entregas o cambios.</p>
                </div>

                <div class="row g-4">
                    <div class="col-lg-4">
                        <div class="feature-panel h-100">
                            <h2 class="h5 mb-3">Canales disponibles</h2>
                            <p class="mb-2"><strong>Email:</strong> info@golazostore.com</p>
                            <p class="mb-2"><strong>WhatsApp:</strong> +598 99 123 456</p>
                            <p class="mb-0"><strong>Ubicacion:</strong> Montevideo, Uruguay</p>
                        </div>
                    </div>
                    <div class="col-lg-8">
                        <div class="card border-0 shadow-sm">
                            <div class="card-body p-4">
                                <form>
                                    <div class="row g-3">
                                        <div class="col-md-6">
                                            <label for="contactName" class="form-label">Nombre</label>
                                            <input type="text" class="form-control" id="contactName" required>
                                        </div>
                                        <div class="col-md-6">
                                            <label for="contactEmail" class="form-label">Email</label>
                                            <input type="email" class="form-control" id="contactEmail" required>
                                        </div>
                                        <div class="col-12">
                                            <label for="contactSubject" class="form-label">Asunto</label>
                                            <input type="text" class="form-control" id="contactSubject">
                                        </div>
                                        <div class="col-12">
                                            <label for="contactMessage" class="form-label">Mensaje</label>
                                            <textarea class="form-control" id="contactMessage" rows="6" required></textarea>
                                        </div>
                                        <div class="col-12 d-grid">
                                            <button type="submit" class="btn btn-danger btn-lg">Enviar mensaje</button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/shell.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
