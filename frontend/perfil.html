<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi perfil - GolazoStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="icon" type="image/png" href="assets/images/logo.png">
</head>
<body>
    <header></header>
    <main>
        <nav aria-label="breadcrumb">
            <div class="container">
                <ol class="breadcrumb py-3 mb-0">
                    <li class="breadcrumb-item"><a href="home.html"><i class="fas fa-home"></i> Inicio</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Mi perfil</li>
                </ol>
            </div>
        </nav>

        <section class="py-5">
            <div class="container">
                <div class="row g-4">
                    <div class="col-lg-3">
                        <div class="card border-0 shadow-sm">
                            <div class="card-body text-center">
                                <i class="fas fa-user-circle fa-4x text-danger mb-3"></i>
                                <h2 class="h5" id="profileName">Cargando...</h2>
                                <p class="text-muted small mb-0" id="profileEmail"></p>
                            </div>
                            <div class="list-group list-group-flush">
                                <a class="list-group-item list-group-item-action active" href="perfil.html">Mi perfil</a>
                                <a class="list-group-item list-group-item-action" href="mis-pedidos.html">Mis pedidos</a>
                                <a class="list-group-item list-group-item-action" href="carrito.html">Mi carrito</a>
                                <a class="list-group-item list-group-item-action d-none" href="admin-products.html" id="adminPanelLink">Panel admin</a>
                                <a class="list-group-item list-group-item-action text-danger" href="javascript:void(0)" onclick="GolazoAuth.logout(); return false;">Cerrar sesion</a>
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-9">
                        <div class="card border-0 shadow-sm">
                            <div class="card-body p-4">
                                <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
                                    <div>
                                        <p class="eyebrow mb-2">Cuenta</p>
                                        <h1 class="h3 mb-0">Datos personales</h1>
                                    </div>
                                </div>

                                <form id="profileForm" class="row g-3">
                                    <div class="col-md-6">
                                        <label for="firstName" class="form-label">Nombre</label>
                                        <input type="text" class="form-control" id="firstName" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="lastName" class="form-label">Apellido</label>
                                        <input type="text" class="form-control" id="lastName" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="email" class="form-label">Email</label>
                                        <input type="email" class="form-control" id="email" readonly disabled>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="phone" class="form-label">Telefono</label>
                                        <input type="tel" class="form-control" id="phone">
                                    </div>
                                    <div class="col-12">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="newsletter">
                                            <label class="form-check-label" for="newsletter">Recibir lanzamientos y promociones</label>
                                        </div>
                                    </div>
                                    <div class="col-12">
                                        <div id="profileAlert" class="alert d-none"></div>
                                    </div>
                                    <div class="col-12 d-flex justify-content-between flex-wrap gap-3 align-items-center">
                                        <div class="small text-muted">
                                            Miembro desde: <span id="memberSince">-</span>
                                            <span class="mx-2">·</span>
                                            Pedidos registrados: <span id="totalOrders">0</span>
                                        </div>
                                        <button type="submit" class="btn btn-danger" id="saveBtn">Guardar cambios</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/shell.js"></script>
    <script src="js/main.js"></script>
    <script src="js/perfil.js"></script>
</body>
</html>
