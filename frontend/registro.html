<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - GolazoStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="icon" type="image/png" href="assets/images/logo.png">
</head>
<body>
    <header></header>
    <main>
        <nav aria-label="breadcrumb">
            <div class="container">
                <ol class="breadcrumb py-3 mb-0">
                    <li class="breadcrumb-item"><a href="home.html"><i class="fas fa-home"></i> Inicio</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Registro</li>
                </ol>
            </div>
        </nav>

        <section class="py-5">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-7">
                        <div class="card border-0 shadow-sm">
                            <div class="card-body p-4 p-lg-5">
                                <div class="text-center mb-4">
                                    <i class="fas fa-user-plus fa-4x text-danger mb-3"></i>
                                    <p class="eyebrow mb-2">Nueva cuenta</p>
                                    <h1 class="h3 mb-2">Crear cuenta en GolazoStore</h1>
                                    <p class="text-muted mb-0">Registra tus datos para guardar compras y seguir pedidos.</p>
                                </div>

                                <form id="registerForm">
                                    <div class="row g-3">
                                        <div class="col-md-6">
                                            <label for="firstName" class="form-label">Nombre</label>
                                            <input type="text" class="form-control" id="firstName" required>
                                        </div>
                                        <div class="col-md-6">
                                            <label for="lastName" class="form-label">Apellido</label>
                                            <input type="text" class="form-control" id="lastName" required>
                                        </div>
                                        <div class="col-md-6">
                                            <label for="email" class="form-label">Email</label>
                                            <input type="email" class="form-control" id="email" required>
                                        </div>
                                        <div class="col-md-6">
                                            <label for="phone" class="form-label">Telefono</label>
                                            <input type="tel" class="form-control" id="phone" placeholder="+598 99 123 456">
                                        </div>
                                        <div class="col-md-6">
                                            <label for="password" class="form-label">Contrasena</label>
                                            <div class="input-group">
                                                <input type="password" class="form-control" id="password" required>
                                                <button class="btn btn-outline-secondary" type="button" id="togglePassword"><i class="fas fa-eye"></i></button>
                                            </div>
                                            <div class="form-text">Minimo 6 caracteres, con letras y numeros.</div>
                                        </div>
                                        <div class="col-md-6">
                                            <label for="confirmPassword" class="form-label">Confirmar contrasena</label>
                                            <div class="input-group">
                                                <input type="password" class="form-control" id="confirmPassword" required>
                                                <button class="btn btn-outline-secondary" type="button" id="toggleConfirmPassword"><i class="fas fa-eye"></i></button>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="form-check mt-4">
                                        <input class="form-check-input" type="checkbox" id="acceptTerms" required>
                                        <label class="form-check-label" for="acceptTerms">Acepto los terminos y condiciones del sitio.</label>
                                    </div>
                                    <div class="form-check mt-2 mb-4">
                                        <input class="form-check-input" type="checkbox" id="newsletter">
                                        <label class="form-check-label" for="newsletter">Quiero recibir novedades y lanzamientos.</label>
                                    </div>

                                    <div class="d-grid">
                                        <button type="submit" class="btn btn-danger btn-lg">
                                            <i class="fas fa-user-plus me-2"></i>Crear cuenta
                                        </button>
                                    </div>
                                </form>

                                <div class="text-center mt-4 small">
                                    <span class="text-muted">Ya tienes cuenta?</span>
                                    <a href="login.html" class="text-decoration-none text-danger ms-1">Iniciar sesion</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/shell.js"></script>
    <script src="js/main.js"></script>
    <script src="js/registro.js"></script>
</body>
</html>
