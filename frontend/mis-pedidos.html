<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis pedidos - GolazoStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="icon" type="image/png" href="assets/images/logo.png">
</head>
<body>
    <header></header>
    <main>
        <nav aria-label="breadcrumb">
            <div class="container">
                <ol class="breadcrumb py-3 mb-0">
                    <li class="breadcrumb-item"><a href="home.html"><i class="fas fa-home"></i> Inicio</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Mis pedidos</li>
                </ol>
            </div>
        </nav>

        <section class="orders-section py-5">
            <div class="container">
                <div class="row g-4">
                    <div class="col-lg-3">
                        <div class="card border-0 shadow-sm">
                            <div class="card-body text-center">
                                <i class="fas fa-user-circle fa-4x text-danger mb-3"></i>
                                <h2 class="h5" id="profileName">Cuenta</h2>
                                <p class="text-muted small mb-0" id="profileEmail"></p>
                            </div>
                            <div class="list-group list-group-flush">
                                <a class="list-group-item list-group-item-action" href="perfil.html">Mi perfil</a>
                                <a class="list-group-item list-group-item-action active" href="mis-pedidos.html">Mis pedidos</a>
                                <a class="list-group-item list-group-item-action" href="carrito.html">Mi carrito</a>
                                <a class="list-group-item list-group-item-action text-danger" href="javascript:void(0)" onclick="GolazoAuth.logout(); return false;">Cerrar sesion</a>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-9">
                        <div class="card border-0 shadow-sm">
                            <div class="card-body p-4">
                                <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-3">
                                    <div>
                                        <p class="eyebrow mb-2">Historial</p>
                                        <h1 class="h3 mb-0">Pedidos confirmados</h1>
                                    </div>
                                    <span class="badge text-bg-danger" id="ordersCount">0 pedido(s)</span>
                                </div>
                                <div class="alert alert-light border" id="ordersNotice"></div>
                                <div id="emptyOrders" class="text-center py-5">
                                    <i class="fas fa-box-open fa-4x text-muted mb-3"></i>
                                    <h2 class="h4">Todavia no registraste compras</h2>
                                    <p class="text-muted mb-4">Cuando cierres el checkout, tus pedidos apareceran aqui.</p>
                                    <a href="catalogo.html" class="btn btn-danger">Ir al catalogo</a>
                                </div>
                                <div id="ordersList" class="d-none"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/shell.js"></script>
    <script src="js/main.js"></script>
    <script src="js/mis-pedidos.js"></script>
</body>
</html>
