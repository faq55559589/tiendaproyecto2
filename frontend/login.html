<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesion - GolazoStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="icon" type="image/png" href="assets/images/logo.png">
</head>
<body>
    <header></header>
    <main>
        <nav aria-label="breadcrumb">
            <div class="container">
                <ol class="breadcrumb py-3 mb-0">
                    <li class="breadcrumb-item"><a href="home.html"><i class="fas fa-home"></i> Inicio</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Iniciar sesion</li>
                </ol>
            </div>
        </nav>

        <section class="py-5">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-5 col-md-7">
                        <div class="card border-0 shadow-sm">
                            <div class="card-body p-4 p-lg-5">
                                <div class="text-center mb-4">
                                    <i class="fas fa-user-circle fa-4x text-danger mb-3"></i>
                                    <p class="eyebrow mb-2">Acceso</p>
                                    <h1 class="h3 mb-2">Entrar a tu cuenta</h1>
                                    <p class="text-muted mb-0">Accede para continuar con tu compra y revisar pedidos.</p>
                                </div>

                                <form id="loginForm">
                                    <div class="mb-3">
                                        <label for="email" class="form-label">Email</label>
                                        <input type="email" class="form-control" id="email" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="password" class="form-label">Contrasena</label>
                                        <div class="input-group">
                                            <input type="password" class="form-control" id="password" required>
                                            <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                                <i class="fas fa-eye"></i>
                                            </button>
                                        </div>
                                    </div>
                                    <div class="form-check mb-4">
                                        <input class="form-check-input" type="checkbox" id="rememberMe">
                                        <label class="form-check-label" for="rememberMe">Recordarme en este navegador</label>
                                    </div>
                                    <div class="d-grid">
                                        <button type="submit" class="btn btn-danger btn-lg">
                                            <i class="fas fa-right-to-bracket me-2"></i>Iniciar sesion
                                        </button>
                                    </div>
                                </form>

                                <div class="d-flex justify-content-between flex-wrap gap-2 mt-4 small">
                                    <a href="recuperar-contrasena.html" class="text-decoration-none text-danger">Olvide mi contrasena</a>
                                    <a href="registro.html" class="text-decoration-none text-danger">Crear cuenta</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/shell.js"></script>
    <script src="js/main.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
